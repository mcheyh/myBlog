    /* ---------- sticky header ---------- */

    .sticky-header{
      position:sticky;
      top:0;
      z-index:100;
      background:rgba(255,255,255,0.78);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(152,44,97,0.15);
      box-shadow:0 1px 8px rgba(0,0,0,0.05);
    }

    .header-inner{
      max-width:56rem;
      margin:0 auto;
      padding:0.75rem 1.5rem;
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:0.5rem 1rem;
    }

    .header-title{
      font-size:1.15rem;
      font-weight:700;
      color:#1f2937;
      text-decoration:none;
      white-space:nowrap;
      transition:color 0.2s;
    }

    .header-title:hover{
      color:rgb(152 44 97);
    }

    /* ---------- nav ---------- */

    .nav-menu{

      flex-wrap:wrap;
      justify-content:center;

    }

    .nav-menu a{
      display:inline-block;

      font-size:0.9rem;
      font-weight:500;
      color:#4b5563;
      text-decoration:none;
      border-bottom:2px solid transparent;

    .nav-menu a:hover{

    }

    .hobby-card{

      .hobby-card{
        width:100%;

    /* ---------- works ---------- */

    .works-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
      gap:1.5rem;
    }

    .work-card{
      background:white;
      border-radius:12px;
      overflow:hidden;
      border:1px solid #e5e7eb;

      transition:transform 0.25s ease, box-shadow 0.25s ease;

      text-decoration:none;
      color:inherit;
      display:block;
    }

    .work-card:hover{

      box-shadow:0 12px 30px rgba(0,0,0,0.13);
    }

    .work-cover{
      width:100%;
      aspect-ratio:16 / 9;
      object-fit:cover;
      display:block;
      background:#f3f4f6;
    }

    .work-info{

    .modal-overlay{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      z-index:9999;
      justify-content:center;
      align-items:center;
      animation:fadeIn 0.2s ease;
    }

    .modal-overlay.active{
      display:flex;
    }

    .modal-box{
      position:relative;
      width:90vw;
      max-width:900px;
      background:#000;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
      animation:scaleIn 0.25s ease;
    }

    .modal-close{
      position:absolute;
      top:10px;
      right:16px;
      z-index:10;
      background:rgba(0,0,0,0.6);
      color:#fff;
      border:none;
      font-size:28px;
      width:40px;
      height:40px;
      border-radius:50%;
      cursor:pointer;
      line-height:40px;
      text-align:center;
      transition:background 0.2s;
    }

    .modal-close:hover{
      background:rgba(255,255,255,0.25);
    }

    .modal-player{
      width:100%;
      aspect-ratio:16 / 9;
      border:none;
      display:block;
    }

    @keyframes fadeIn{
      from{opacity:0}
      to{opacity:1}
    }

    @keyframes scaleIn{
      from{transform:scale(0.92);opacity:0}
      to{transform:scale(1);opacity:1}

<script>
const contactTable = document.getElementById("contact-table");

contacts.forEach(contact => {

  let valueHtml = contact.value;

  if (contact.link) {
    valueHtml = `
      <a href="${contact.link}" target="_blank">
        ${contact.value}
      </a>
    `;
  }

  contactTable.innerHTML += `
    <tr>
      <td>${contact.type}</td>
      <td>${valueHtml}</td>
    </tr>
  `;
});
</script>


<script>
const educationTable = document.getElementById("education-table");

educations.forEach(edu => {

  educationTable.innerHTML += `
    <tr>
      <td>
        <a href="${edu.link}">
          ${edu.school}
        </a>
      </td>

      <td>
        ${edu.degree}
      </td>

      <td>
        ${edu.status}
      </td>

      <td>
        ${edu.major}
      </td>
    </tr>
  `;
});
</script>

<script>
const tbody = document.getElementById("contest-table");

contests.forEach(contest => {

  let html = "";

  // 有 organization
  if (contest.organization) {

    html += `
      <tr>
        <td rowspan="${contest.awards.length + 1}" class="align-top">
          ${contest.time}
        </td>

        <td colspan="2" class="no-indent font-bold text-black">
          ${contest.organization}
        </td>
      </tr>
    `;

    contest.awards.forEach(award => {

      let awardHtml = award[1];

      // award 有链接
      if (award[2]) {
        awardHtml += `
          [<a href="${award[2]}" target="_blank">
            ${award[3]}
          </a>]
        `;
      }

      html += `
        <tr>
          <td>${award[0]}</td>
          <td>${awardHtml}</td>
        </tr>
      `;
    });

  }

  // 没有 organization
  else {

    contest.awards.forEach((award, index) => {

      let awardHtml = award[1];

      // award 有链接
      if (award[2]) {
        awardHtml += `
          [<a href="${award[2]}" target="_blank">
            ${award[3]}
          </a>]
        `;
      }

      html += `
        <tr>

          ${index === 0 ? `
            <td rowspan="${contest.awards.length}" class="align-top">
              ${contest.time}
            </td>
          ` : ""}

          <td>${award[0]}</td>

          <td>${awardHtml}</td>

        </tr>
      `;
    });

  }

  tbody.innerHTML += html;
});
</script>

<!-- ========== 渲染「作品展示」板块（先用静态数据，API 成功后自动更新） ========== -->
<script>
(function() {
  var rendered = false;

  function renderWorks(list) {
    if (rendered) return;
    rendered = true;

    var grid = document.getElementById('works-grid');
    var countEl = document.getElementById('work-count');

    if (!list || list.length === 0) {
      grid.innerHTML = '<p style="text-align:center;color:#9ca3af;padding:2rem;">暂无作品展示，请稍后刷新</p>';
      return;
    }

    countEl.textContent = list.length;

    // 根据视频数量动态调整网格列的最小宽度
    var minWidth = 300;
    if (list.length <= 2) minWidth = 400;
    else if (list.length <= 4) minWidth = 340;
    else if (list.length >= 9) minWidth = 260;
    grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(' + minWidth + 'px, 1fr))';

    list.forEach(function(w) {
      var card = document.createElement('div');
      card.className = 'work-card';

      // 点击弹出播放器
      card.addEventListener('click', function() {
        openVideoModal(w.bvid, w.title);
      });

      if (w.cover) {
        card.innerHTML += '<img class="work-cover" src="' + w.cover + '" alt="' + w.title + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">';
        card.innerHTML += '<div class="work-cover" style="display:none;align-items:center;justify-content:center;background:linear-gradient(135deg,#f3f4f6,#e5e7eb);color:#d1d5db;font-size:2.5rem;">🎬</div>';
      } else {
        card.innerHTML += '<div class="work-cover" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f3f4f6,#e5e7eb);color:#d1d5db;font-size:2.5rem;">🎬</div>';
      }

      card.innerHTML +=
        '<div class="work-info">' +
          '<div class="work-title">' + w.title + '</div>' +
          (w.desc ? '<div class="work-desc">' + w.desc + '</div>' : '') +
        '</div>';

      grid.appendChild(card);
    });
  }

  // ---- 模态播放器 ----
  function openVideoModal(bvid, title) {
    var overlay = document.getElementById('video-modal');
    var oldPlayer = document.getElementById('modal-player');

    // 销毁旧 iframe，重建一个（避免缓存导致续播）
    var newPlayer = oldPlayer.cloneNode(true);
    oldPlayer.parentNode.replaceChild(newPlayer, oldPlayer);
    newPlayer.src = 'https://player.bilibili.com/player.html?bvid=' + bvid + '&page=1&autoplay=1&t=0&_=' + Date.now();
    newPlayer.id = 'modal-player';

    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeVideoModal() {
    var overlay = document.getElementById('video-modal');
    var player = document.getElementById('modal-player');

    // 彻底销毁 iframe，阻止后台继续播放
    player.src = 'about:blank';
    var newPlayer = player.cloneNode(true);
    player.parentNode.replaceChild(newPlayer, player);
    newPlayer.id = 'modal-player';

    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  // 关闭按钮
  document.getElementById('modal-close').addEventListener('click', closeVideoModal);

  // 点击遮罩层关闭
  document.getElementById('video-modal').addEventListener('click', function(e) {
    if (e.target === this) closeVideoModal();
  });

  // ESC 键关闭
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeVideoModal();
  });

  // 先用静态数据渲染
  function renderStatic() {
    var check = setInterval(function() {
      if (typeof works === 'undefined') return;
      clearInterval(check);
      renderWorks(works);
    }, 50);
  }

  // 尝试用 API 获取最新数据
  function tryApiUpdate() {
    var check = setInterval(function() {
      if (typeof fetchBilibiliVideos === 'undefined') return;
      clearInterval(check);

      fetchBilibiliVideos('285015360').then(function(apiWorks) {
        if (apiWorks && apiWorks.length > 0) {
          // API 成功！用新数据重新渲染
          rendered = false;
          document.getElementById('works-grid').innerHTML = '';
          renderWorks(apiWorks);
        }
      });
    }, 50);
  }

  renderStatic();
  tryApiUpdate();
})();
</script>

<!-- ========== 渲染「关于我」板块 ========== -->
<script>
(function renderAbout() {
  var check = setInterval(function() {
    if (typeof about === 'undefined') return;
    clearInterval(check);

    document.getElementById('about-intro').textContent = about.intro;

    var grid = document.getElementById('hobby-grid');
    about.hobbies.forEach(function(h) {
      grid.innerHTML +=
        '<div class="hobby-card">' +
          '<span class="hobby-icon">' + h.icon + '</span>' +
          '<div class="hobby-name">' + h.name + '</div>' +
          '<div class="hobby-desc">' + h.desc + '</div>' +
        '</div>';
    });
  }, 50);
})();
</script>
