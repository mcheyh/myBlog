<script>
const contactTable = document.getElementById("contact-table");

contacts.forEach(contact => {

  let valueHtml = contact.value;

  if (contact.link) {
    valueHtml = `
      <a href="${contact.link}" target="_blank">
        ${contact.value}
      </a>
    `;
  }

  contactTable.innerHTML += `
    <tr>
      <td>${contact.type}</td>
      <td>${valueHtml}</td>
    </tr>
  `;
});
</script>


<script>
const educationTable = document.getElementById("education-table");

educations.forEach(edu => {

  educationTable.innerHTML += `
    <tr>
      <td>
        <a href="${edu.link}">
          ${edu.school}
        </a>
      </td>

      <td>
        ${edu.degree}
      </td>

      <td>
        ${edu.status}
      </td>

      <td>
        ${edu.major}
      </td>
    </tr>
  `;
});
</script>

<script>
const tbody = document.getElementById("contest-table");

contests.forEach(contest => {

  let html = "";

  // 有 organization
  if (contest.organization) {

    html += `
      <tr>
        <td rowspan="${contest.awards.length + 1}" class="align-top">
          ${contest.time}
        </td>

        <td colspan="2" class="no-indent font-bold text-black">
          ${contest.organization}
        </td>
      </tr>
    `;

    contest.awards.forEach(award => {

      let awardHtml = award[1];

      // award 有链接
      if (award[2]) {
        awardHtml += `
          [<a href="${award[2]}" target="_blank">
            ${award[3]}
          </a>]
        `;
      }

      html += `
        <tr>
          <td>${award[0]}</td>
          <td>${awardHtml}</td>
        </tr>
      `;
    });

  }

  // 没有 organization
  else {

    contest.awards.forEach((award, index) => {

      let awardHtml = award[1];

      // award 有链接
      if (award[2]) {
        awardHtml += `
          [<a href="${award[2]}" target="_blank">
            ${award[3]}
          </a>]
        `;
      }

      html += `
        <tr>

          ${index === 0 ? `
            <td rowspan="${contest.awards.length}" class="align-top">
              ${contest.time}
            </td>
          ` : ""}

          <td>${award[0]}</td>

          <td>${awardHtml}</td>

        </tr>
      `;
    });

  }

  tbody.innerHTML += html;
});
</script>
