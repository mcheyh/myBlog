<script>
const contactTable = document.getElementById("contact-table");

contacts.forEach(contact => {

  let valueHtml = contact.value;

  if (contact.link) {
    valueHtml = `
      <a href="${contact.link}" target="_blank">
        ${contact.value}
      </a>
    `;
  }

  contactTable.innerHTML += `
    <tr>
      <td>${contact.type}</td>
      <td>${valueHtml}</td>
    </tr>
  `;
});
</script>


<script>
const educationTable = document.getElementById("education-table");

educations.forEach(edu => {

  educationTable.innerHTML += `
    <tr>
      <td>
        <a href="${edu.link}">
          ${edu.school}
        </a>
      </td>

      <td>
        ${edu.degree}
      </td>

      <td>
        ${edu.status}
      </td>

      <td>
        ${edu.major}
      </td>
    </tr>
  `;
});
</script>

     <script>
const tbody = document.getElementById("contest-table");

contests.forEach(contest => {

  let html = `
    <tr>
      <td rowspan="${contest.awards.length + 1}" class="align-top">
        ${contest.time}
      </td>

      <td colspan="4" class="md:!pl-0">
        ${contest.organization}
        [<a href="${contest.link}">OIerDb</a>]
      </td>
    </tr>
  `;

  contest.awards.forEach(award => {
    html += `
      <tr>
        <td>${award[0]}</td>
        <td>${award[1]}</td>
      </tr>
    `;
  });

  tbody.innerHTML += html;
});
</script>
